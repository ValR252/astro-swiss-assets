<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Phases lunaires -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Lune nouvelle (centre) -->
    <circle cx="50" cy="50" r="25" fill="#C9A227" fill-opacity="0.1"/>
    <!-- Croissant croissant à droite -->
    <path d="M75 50 Q85 35 75 20" fill="none"/>
    <path d="M75 50 Q85 65 75 80" fill="none"/>
    <path d="M75 20 Q80 35 75 50 Q80 65 75 80" fill="#C9A227" fill-opacity="0.3"/>
    <!-- Croissant décroissant à gauche -->
    <path d="M25 50 Q15 35 25 20" fill="none"/>
    <path d="M25 50 Q15 65 25 80" fill="none"/>
    <path d="M25 20 Q20 35 25 50 Q20 65 25 80" fill="#C9A227" fill-opacity="0.3"/>
    <!-- Lune pleine (contour) -->
    <circle cx="50" cy="50" r="25" stroke-dasharray="2 3" stroke-opacity="0.5"/>
    <!-- Points nakshatra -->
    <circle cx="50" cy="25" r="2" fill="#C9A227"/>
    <circle cx="50" cy="75" r="2" fill="#C9A227"/>
    <circle cx="25" cy="50" r="2" fill="#C9A227"/>
    <circle cx="75" cy="50" r="2" fill="#C9A227"/>
    <!-- Ligne orbitale -->
    <ellipse cx="50" cy="50" rx="40" ry="15" stroke-opacity="0.3"/>
    <!-- Symboles de nuit -->
    <circle cx="20" cy="20" r="1.5" fill="#C9A227"/>
    <circle cx="80" cy="25" r="1.5" fill="#C9A227"/>
    <circle cx="85" cy="70" r="1.5" fill="#C9A227"/>
  </g>
</svg>