<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Élément Terre (Prithvi) -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cube/solide stylisé (Terre) -->
    <path d="M25 35 L50 20 L75 35 L75 65 L50 80 L25 65 Z"/>
    <!-- Lignes de structure -->
    <line x1="50" y1="20" x2="50" y2="50"/>
    <line x1="25" y1="35" x2="50" y2="50"/>
    <line x1="75" y1="35" x2="50" y2="50"/>
    <line x1="25" y1="65" x2="50" y2="50"/>
    <line x1="75" y1="65" x2="50" y2="50"/>
    <!-- Lignes horizontales de la base -->
    <line x1="25" y1="35" x2="75" y2="35" stroke-opacity="0.5"/>
    <line x1="25" y1="65" x2="75" y2="65" stroke-opacity="0.5"/>
    <!-- Montagne stylisée -->
    <path d="M35 60 L50 35 L65 60" fill="#C9A227" fill-opacity="0.15"/>
    <line x1="42" y1="50" x2="50" y2="35"/>
    <line x1="58" y1="50" x2="50" y2="35"/>
    <!-- Racines/lignes telluriques -->
    <line x1="50" y1="80" x2="50" y2="88"/>
    <line x1="40" y1="75" x2="35" y2="90" stroke-opacity="0.4"/>
    <line x1="60" y1="75" x2="65" y2="90" stroke-opacity="0.4"/>
    <!-- Points de stabilité -->
    <circle cx="25" cy="35" r="2" fill="#C9A227"/>
    <circle cx="75" y1="35" r="2" fill="#C9A227"/>
    <circle cx="25" cy="65" r="2" fill="#C9A227"/>
    <circle cx="75" cy="65" r="2" fill="#C9A227"/>
    <circle cx="50" cy="50" r="3" fill="#C9A227"/>
  </g>
</svg>