<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Flèche/But -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cercles concentriques (cible) -->
    <circle cx="50" cy="50" r="35"/>
    <circle cx="50" cy="50" r="25"/>
    <circle cx="50" cy="50" r="15"/>
    <circle cx="50" cy="50" r="5" fill="#C9A227"/>
    <!-- Lignes de visée -->
    <line x1="50" y1="5" x2="50" y2="20" stroke-opacity="0.5"/>
    <line x1="50" y1="80" x2="50" y2="95" stroke-opacity="0.5"/>
    <line x1="5" y1="50" x2="20" y2="50" stroke-opacity="0.5"/>
    <line x1="80" y1="50" x2="95" y2="50" stroke-opacity="0.5"/>
    <!-- Flèche -->
    <line x1="15" y1="50" x2="75" y2="50" stroke-width="2"/>
    <!-- Pointe de la flèche -->
    <path d="M75 50 L90 42 L85 50 L90 58 Z" fill="#C9A227"/>
    <!-- Plumes de l'empennage -->
    <path d="M15 50 L8 42 L15 50 L8 58 Z" fill="#C9A227" fill-opacity="0.5"/>
    <line x1="12" y1="48" x2="6" y2="44"/>
    <line x1="12" y1="52" x2="6" y2="56"/>
    <!-- Trajectoire -->
    <path d="M15 50 Q25 45 35 48 Q45 52 55 49 Q65 46 75 50" stroke-opacity="0.3" stroke-dasharray="3 2"/>
    <!-- Points de direction -->
    <circle cx="25" cy="48" r="1.5" fill="#C9A227" fill-opacity="0.4"/>
    <circle cx="45" cy="50" r="1.5" fill="#C9A227" fill-opacity="0.4"/>
    <circle cx="65" cy="48" r="1.5" fill="#C9A227" fill-opacity="0.4"/>
  </g>
</svg>