<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Chemin/Dharma - direction -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Point de départ (cercle) -->
    <circle cx="50" cy="85" r="6"/>
    <!-- Chemin sinueux vers le haut -->
    <path d="M50 79 Q35 70 40 60 Q45 50 35 40 Q25 30 50 20"/>
    <!-- Flèche au sommet -->
    <path d="M45 28 L50 15 L55 28"/>
    <line x1="50" y1="15" x2="50" y2="25"/>
    <!-- Points de passage (karma) -->
    <circle cx="40" cy="60" r="3" fill="#C9A227" fill-opacity="0.4"/>
    <circle cx="35" cy="40" r="3" fill="#C9A227" fill-opacity="0.6"/>
    <!-- Lignes de perspective latérales -->
    <line x1="20" y1="85" x2="30" y2="70"/>
    <line x1="80" y1="85" x2="70" y2="70"/>
  </g>
</svg>