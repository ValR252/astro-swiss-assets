<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Élément Air (Vayu) -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Spirales de vent -->
    <path d="M20 30 Q40 25 55 35 Q65 42 55 50"/>
    <path d="M15 50 Q35 45 50 55 Q60 62 50 70"/>
    <path d="M25 70 Q45 65 60 75"/>
    <!-- Volutes secondaires -->
    <path d="M70 25 Q85 30 80 45" stroke-opacity="0.6"/>
    <path d="M75 55 Q90 60 85 75" stroke-opacity="0.6"/>
    <!-- Lignes de courant -->
    <line x1="30" y1="40" x2="45" y2="42" stroke-opacity="0.4"/>
    <line x1="35" y1="60" x2="50" y2="62" stroke-opacity="0.4"/>
    <line x1="60" y1="35" x2="72" y2="38" stroke-opacity="0.4"/>
    <!-- Symbole du souffle vital -->
    <circle cx="50" cy="50" r="15" stroke-opacity="0.3"/>
    <circle cx="50" cy="50" r="8" stroke-opacity="0.5"/>
    <circle cx="50" cy="50" r="3" fill="#C9A227"/>
    <!-- Flèches de direction -->
    <path d="M85 30 L92 25 L88 35" stroke-opacity="0.5"/>
    <path d="M88 35 L85 30" stroke-opacity="0.5"/>
    <path d="M10 70 L5 75 L12 72" stroke-opacity="0.5"/>
    <path d="M12 72 L10 70" stroke-opacity="0.5"/>
    <!-- Points d'air léger -->
    <circle cx="30" cy="25" r="1.5" fill="#C9A227" fill-opacity="0.4"/>
    <circle cx="70" cy="80" r="1.5" fill="#C9A227" fill-opacity="0.4"/>
    <circle cx="85" cy="60" r="1" fill="#C9A227" fill-opacity="0.3"/>
  </g>
</svg>