<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Diya - lampe à huile -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Coupe du diya -->
    <path d="M25 65 Q25 85 50 85 Q75 85 75 65"/>
    <line x1="25" y1="65" x2="75" y2="65"/>
    <!-- Base plate -->
    <line x1="30" y1="85" x2="70" y2="85"/>
    <!-- Huile dans la lampe -->
    <ellipse cx="50" cy="68" rx="20" ry="5" fill="#C9A227" fill-opacity="0.2"/>
    <!-- Mèche -->
    <line x1="50" y1="65" x2="50" y2="50"/>
    <!-- Flamme -->
    <path d="M50 50 Q43 42 45 35 Q48 28 50 25 Q52 28 55 35 Q57 42 50 50"/>
    <!-- Cœur de la flamme -->
    <path d="M50 45 Q48 40 49 36 Q50 33 51 36 Q52 40 50 45" fill="#C9A227" fill-opacity="0.4"/>
    <!-- Halo lumineux -->
    <circle cx="50" cy="38" r="12" stroke-opacity="0.3"/>
    <circle cx="50" cy="38" r="18" stroke-opacity="0.2"/>
    <!-- Reflets -->
    <ellipse cx="60" cy="72" rx="4" ry="2" fill="#C9A227" fill-opacity="0.3"/>
  </g>
</svg>