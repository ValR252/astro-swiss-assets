<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Horloge cosmique -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cadran extérieur -->
    <circle cx="50" cy="50" r="38"/>
    <!-- Cercle intérieur -->
    <circle cx="50" cy="50" r="30"/>
    <!-- Marques horaires (12) -->
    <line x1="50" y1="12" x2="50" y2="18"/>
    <line x1="50" y1="82" x2="50" y2="88"/>
    <line x1="12" y1="50" x2="18" y2="50"/>
    <line x1="82" y1="50" x2="88" y2="50"/>
    <line x1="26" y1="26" x2="30" y2="30"/>
    <line x1="74" y1="26" x2="70" y2="30"/>
    <line x1="26" y1="74" x2="30" y2="70"/>
    <line x1="74" y1="74" x2="70" y2="70"/>
    <!-- Aiguille des heures (Yuga) -->
    <line x1="50" y1="50" x2="65" y2="35" stroke-width="2.5"/>
    <circle cx="65" cy="35" r="2" fill="#C9A227"/>
    <!-- Aiguille des minutes (Kalpa) -->
    <line x1="50" y1="50" x2="35" y2="70"/>
    <circle cx="35" cy="70" r="1.5" fill="#C9A227"/>
    <!-- Centre -->
    <circle cx="50" cy="50" r="5" fill="#C9A227"/>
    <!-- Symboles cosmiques -->
    <circle cx="50" cy="25" r="2" stroke-opacity="0.6"/>
    <circle cx="75" cy="50" r="2" stroke-opacity="0.6"/>
    <circle cx="50" cy="75" r="2" stroke-opacity="0.6"/>
    <circle cx="25" cy="50" r="2" stroke-opacity="0.6"/>
    <!-- Spirale du temps -->
    <path d="M50 50 Q55 45 60 50 Q65 55 70 50" stroke-opacity="0.4"/>
  </g>
</svg>