<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Nœud - Rahu/Ketu -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cercle extérieur (cycle karmique) -->
    <circle cx="50" cy="50" r="38"/>
    <!-- Nœud central en forme de 8/symbole de l'infini -->
    <path d="M35 35 Q50 20 65 35 Q50 50 35 65 Q50 80 65 65 Q50 50 65 35"/>
    <!-- Point Rahu (tête du dragon) -->
    <circle cx="65" cy="35" r="5" fill="#C9A227"/>
    <path d="M68 32 L72 28"/>
    <path d="M70 30 L74 26"/>
    <!-- Point Ketu (queue du dragon) -->
    <circle cx="35" cy="65" r="4" fill="none"/>
    <path d="M32 68 L28 72"/>
    <path d="M30 70 L26 74"/>
    <!-- Ligne traversant le nœud -->
    <line x1="20" y1="50" x2="80" y2="50" stroke-opacity="0.3"/>
    <line x1="50" y1="20" x2="50" y2="80" stroke-opacity="0.3"/>
  </g>
</svg>