<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Élément Eau (Jala) -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Goutte principale -->
    <path d="M50 15 Q65 35 65 55 Q65 75 50 85 Q35 75 35 55 Q35 35 50 15" fill="#C9A227" fill-opacity="0.15"/>
    <!-- Reflet intérieur -->
    <path d="M50 25 Q58 40 58 55 Q58 70 50 77 Q42 70 42 55 Q42 40 50 25" fill="#C9A227" fill-opacity="0.1"/>
    <!-- Ligne centrale -->
    <line x1="50" y1="20" x2="50" y2="50" stroke-opacity="0.5"/>
    <!-- Ondulations -->
    <path d="M20 75 Q30 70 40 75 Q50 80 60 75 Q70 70 80 75" stroke-opacity="0.6"/>
    <path d="M25 82 Q35 78 45 82 Q55 86 65 82 Q75 78 85 82" stroke-opacity="0.4"/>
    <!-- Gouttelettes -->
    <ellipse cx="30" cy="55" rx="3" ry="4" fill="#C9A227" fill-opacity="0.3"/>
    <ellipse cx="70" cy="50" rx="2.5" ry="3.5" fill="#C9A227" fill-opacity="0.3"/>
    <ellipse cx="25" cy="65" rx="2" ry="3" fill="#C9A227" fill-opacity="0.2"/>
    <!-- Spirale de courant -->
    <path d="M50 60 Q55 65 50 70 Q45 75 50 80" stroke-opacity="0.5"/>
    <!-- Cercle cosmique -->
    <circle cx="50" cy="55" r="38" stroke-opacity="0.2"/>
  </g>
</svg>