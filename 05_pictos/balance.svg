<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Balance/Équilibre -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Piliers central -->
    <line x1="50" y1="85" x2="50" y2="35"/>
    <!-- Base -->
    <line x1="30" y1="85" x2="70" y2="85"/>
    <line x1="35" y1="88" x2="65" y2="88"/>
    <!-- Sommet de la colonne -->
    <circle cx="50" cy="30" r="5"/>
    <!-- Fléau horizontal -->
    <line x1="20" y1="30" x2="80" y2="30"/>
    <!-- Chaînes/cordes gauche -->
    <line x1="25" y1="30" x2="25" y2="55"/>
    <line x1="27" y1="30" x2="27" y2="55"/>
    <!-- Chaînes/cordes droite -->
    <line x1="73" y1="30" x2="73" y2="50"/>
    <line x1="75" y1="30" x2="75" y2="50"/>
    <!-- Plateau gauche -->
    <path d="M15 55 Q25 62 35 55"/>
    <line x1="15" y1="55" x2="35" y2="55"/>
    <!-- Plateau droite -->
    <path d="M65 50 Q75 57 85 50"/>
    <line x1="65" y1="50" x2="85" y2="50"/>
    <!-- Poids/symboles sur les plateaux -->
    <circle cx="25" cy="52" r="4" fill="#C9A227" fill-opacity="0.3"/>
    <circle cx="75" cy="47" r="3" fill="#C9A227" fill-opacity="0.3"/>
    <!-- Ligne d'équilibre -->
    <line x1="10" y1="30" x2="90" y2="30" stroke-opacity="0.2" stroke-dasharray="2 3"/>
    <!-- Indicateur central -->
    <circle cx="50" cy="30" r="2" fill="#C9A227"/>
  </g>
</svg>