<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Zodiaque - symbole -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cercle extérieur -->
    <circle cx="50" cy="50" r="38"/>
    <!-- Cercle médian -->
    <circle cx="50" cy="50" r="30"/>
    <!-- Points zodiacaux (12 positions) -->
    <circle cx="50" cy="20" r="2" fill="#C9A227"/>
    <circle cx="76" cy="32" r="2" fill="#C9A227"/>
    <circle cx="88" cy="50" r="2" fill="#C9A227"/>
    <circle cx="76" cy="68" r="2" fill="#C9A227"/>
    <circle cx="50" cy="80" r="2" fill="#C9A227"/>
    <circle cx="24" cy="68" r="2" fill="#C9A227"/>
    <circle cx="12" cy="50" r="2" fill="#C9A227"/>
    <circle cx="24" cy="32" r="2" fill="#C9A227"/>
    <!-- Points intermédiaires -->
    <circle cx="68" cy="24" r="1.5" fill="#C9A227" fill-opacity="0.6"/>
    <circle cx="82" cy="40" r="1.5" fill="#C9A227" fill-opacity="0.6"/>
    <circle cx="82" cy="60" r="1.5" fill="#C9A227" fill-opacity="0.6"/>
    <circle cx="68" cy="76" r="1.5" fill="#C9A227" fill-opacity="0.6"/>
    <!-- Symbole central stylisé -->
    <circle cx="50" cy="50" r="12"/>
    <circle cx="50" cy="50" r="6"/>
    <!-- Croix cardinale -->
    <line x1="38" y1="50" x2="62" y2="50" stroke-opacity="0.4"/>
    <line x1="50" y1="38" x2="50" y2="62" stroke-opacity="0.4"/>
  </g>
</svg>