<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Lotus - pureté -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Tige -->
    <line x1="50" y1="85" x2="50" y2="55"/>
    <!-- Feuilles flottantes -->
    <ellipse cx="30" cy="82" rx="12" ry="4"/>
    <ellipse cx="70" cy="78" rx="10" ry="3"/>
    <!-- Pétales arrière -->
    <path d="M35 50 Q50 35 65 50"/>
    <path d="M38 45 Q50 30 62 45"/>
    <!-- Pétales avant -->
    <path d="M30 55 Q50 25 70 55"/>
    <path d="M35 52 Q50 28 65 52"/>
    <path d="M40 50 Q50 32 60 50"/>
    <!-- Pétales centraux ouverts -->
    <path d="M42 48 Q50 38 58 48"/>
    <path d="M45 46 Q50 40 55 46"/>
    <!-- Centre du lotus -->
    <circle cx="50" cy="48" r="4" fill="#C9A227" fill-opacity="0.3"/>
    <!-- Points de graines -->
    <circle cx="48" cy="47" r="1" fill="#C9A227"/>
    <circle cx="52" cy="47" r="1" fill="#C9A227"/>
    <circle cx="50" cy="49" r="1" fill="#C9A227"/>
  </g>
</svg>