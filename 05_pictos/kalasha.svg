<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Kalasha - vase sacré -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Base -->
    <ellipse cx="50" cy="85" rx="20" ry="6"/>
    <!-- Corps du vase -->
    <path d="M30 85 Q25 70 30 55 Q35 40 50 40 Q65 40 70 55 Q75 70 70 85"/>
    <!-- Col du vase -->
    <rect x="42" y="32" width="16" height="8" rx="2"/>
    <!-- Bord -->
    <ellipse cx="50" cy="32" rx="10" ry="3"/>
    <!-- Feuilles de mangue stylisées -->
    <path d="M50 30 Q40 20 45 15"/>
    <path d="M50 30 Q50 18 50 12"/>
    <path d="M50 30 Q60 20 55 15"/>
    <!-- Noix de coco stylisée au sommet -->
    <circle cx="50" cy="10" r="4"/>
    <!-- Motifs décoratifs sur le corps -->
    <path d="M35 60 Q50 55 65 60" stroke-opacity="0.5"/>
    <path d="M38 70 Q50 65 62 70" stroke-opacity="0.5"/>
    <!-- Lignes de l'eau sacrée -->
    <line x1="45" y1="50" x2="45" y2="75" stroke-opacity="0.3"/>
    <line x1="55" y1="50" x2="55" y2="75" stroke-opacity="0.3"/>
  </g>
</svg>