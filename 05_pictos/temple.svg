<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Temple/Autel védique -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Base/Plateforme -->
    <rect x="20" y="70" width="60" height="12" rx="2"/>
    <!-- Marches -->
    <line x1="25" y1="74" x2="75" y2="74"/>
    <line x1="25" y1="78" x2="75" y2="78"/>
    <!-- Colonnes -->
    <line x1="28" y1="70" x2="28" y2="40"/>
    <line x1="72" y1="70" x2="72" y2="40"/>
    <!-- Chapiteaux -->
    <rect x="24" y="38" width="8" height="4" rx="1"/>
    <rect x="68" y="38" width="8" height="4" rx="1"/>
    <!-- Toit en forme de dôme/shikhara -->
    <path d="M15 40 Q50 10 85 40"/>
    <path d="M15 40 L85 40"/>
    <!-- Kalasha au sommet -->
    <ellipse cx="50" cy="18" rx="4" ry="6"/>
    <line x1="50" y1="12" x2="50" y2="8"/>
    <circle cx="50" cy="6" r="2"/>
    <!-- Porte centrale -->
    <rect x="40" y="50" width="20" height="20" rx="1"/>
    <line x1="50" y1="50" x2="50" y2="70"/>
  </g>
</svg>