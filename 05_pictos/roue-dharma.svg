<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Roue du Dharma -->
  <g fill="none" stroke="#C9A227" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <!-- Cercle extérieur -->
    <circle cx="50" cy="50" r="38"/>
    <!-- Cercle intérieur -->
    <circle cx="50" cy="50" r="10"/>
    <!-- Rayons (8 pour les nobles vérités/chemins) -->
    <line x1="50" y1="12" x2="50" y2="40"/>
    <line x1="50" y1="60" x2="50" y2="88"/>
    <line x1="12" y1="50" x2="40" y2="50"/>
    <line x1="60" y1="50" x2="88" y2="50"/>
    <line x1="23" y1="23" x2="43" y2="43"/>
    <line x1="57" y1="57" x2="77" y2="77"/>
    <line x1="77" y1="23" x2="57" y2="43"/>
    <line x1="43" y1="57" x2="23" y2="77"/>
    <!-- Décorations aux extrémités des rayons -->
    <circle cx="50" cy="12" r="2"/>
    <circle cx="50" cy="88" r="2"/>
    <circle cx="12" cy="50" r="2"/>
    <circle cx="88" cy="50" r="2"/>
    <circle cx="23" cy="23" r="2"/>
    <circle cx="77" cy="77" r="2"/>
    <circle cx="77" cy="23" r="2"/>
    <circle cx="23" cy="77" r="2"/>
    <!-- Ornement central -->
    <circle cx="50" cy="50" r="4" fill="#C9A227"/>
  </g>
</svg>